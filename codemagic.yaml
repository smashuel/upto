# Codemagic CI/CD — iOS cloud build → TestFlight for the Upto Capacitor shell (ADR 011,
# live-location Stage 2). No Mac required locally: this runs on Codemagic's macOS runner, which
# generates ios/ (gitignored), builds the web bundle, syncs Capacitor, auto-signs with the App
# Store Connect API key, and uploads to TestFlight. The web app keeps deploying to Vercel
# unchanged — this pipeline is additive. See .scratch/live-location-stage-2/mobile-standup-runbook.md.

workflows:
  ios-testflight:
    name: Upto iOS — TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Matches the App Store Connect API key integration name created in Codemagic
      # (Team settings → Integrations → Apple Developer Portal).
      app_store_connect: Sam Wood
    environment:
      groups:
        # Codemagic variable group holding CERTIFICATE_PRIVATE_KEY (secure) — the RSA key used to
        # create/reuse the iOS Distribution certificate. Add it in the app's Environment variables.
        - ios_signing
      vars:
        BUNDLE_ID: "world.upto.app"
      node: 22
      xcode: latest
      # No CocoaPods: Capacitor 8 generates an SPM-based iOS project (App.xcodeproj +
      # CapApp-SPM), no Podfile/workspace. Xcode resolves the Swift packages at build time.
    scripts:
      - name: Install JS dependencies
        script: npm ci
      - name: Build the web bundle (dist/)
        script: npm run build
      - name: Generate the iOS platform (gitignored — created fresh each build)
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
      - name: Capacitor sync iOS (copies dist/ + native config into the SPM project)
        # Capacitor 8 iOS is SPM-based: cap sync writes Package.swift; there's no pod install.
        # Xcode resolves the Swift packages during build-ipa. Assert the .xcodeproj exists.
        script: |
          set -e
          npx cap sync ios
          echo "==== ios/App contents ===="; ls -la "$CM_BUILD_DIR/ios/App"
          test -d "$CM_BUILD_DIR/ios/App/App.xcodeproj" \
            || { echo "FATAL: App.xcodeproj missing after cap sync"; exit 1; }
      - name: Fetch/create the signing certificate + provisioning profile, then apply
        # Explicit signing: --create makes Codemagic CREATE the App Store distribution cert and
        # provisioning profile for the bundle id if they don't exist yet, then use-profiles wires
        # them into the Xcode project (manual signing). Point use-profiles at the exact project
        # (its default **/*.xcodeproj glob can miss the nested Capacitor path) and list the
        # downloaded profiles so a mismatch is visible in the log.
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key "@env:CERTIFICATE_PRIVATE_KEY" \
            --create
          keychain add-certificates
          echo "==== provisioning profiles on runner ===="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null || echo "(none downloaded)"
          xcode-project use-profiles --project "$CM_BUILD_DIR/ios/App/App.xcodeproj"
      - name: Set the build number to Codemagic's incrementing counter
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build the signed .ipa
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Upload only. A processed build is automatically available to INTERNAL testers (us) with
        # no Beta App Review. submit_to_testflight: true would submit for EXTERNAL testing, which
        # requires Beta App Review "Test Information" (feedback email, reviewer contact) we don't
        # need for testing on our own devices. Flip to true + add beta_groups when we want an
        # external beta.
        submit_to_testflight: false
